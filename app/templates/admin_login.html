{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card-futuristic p-4">
            <h2 class="text-center">Accès Admin</h2>
            <form method="POST">
                {{ form.hidden_tag() }}
                <div class="mb-3">{{ form.password.label }} {{ form.password(class="form-control") }}</div>
                {{ form.submit(class="btn btn-glow w-100") }}
            </form>
        </div>
    </div>
</div>
{% endblock %}
